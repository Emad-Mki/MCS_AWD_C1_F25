{% extends "base.html" %}

{% block title %}Register - Online Subscription Portal{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-card">
        <h1>Create Your Account</h1>
        <p class="form-text">
            Register to access offerings, subscribe to programs, and manage everything from your dashboard.
        </p>

        <form method="POST" action="{{ url_for('register') }}" class="auth-form">
            <div class="form-group">
                <label for="name">Name</label>
                <input type="text" id="name" name="name" value="{{ name or '' }}" placeholder="Enter your full name" required>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ email or '' }}" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Register</button>
        </form>

        <p class="form-footer-text">
            Already have an account?
            <a href="{{ url_for('login') }}">Login here</a>
        </p>
    </div>
</section>
{% endblock %}

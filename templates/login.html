{% extends "base.html" %}

{% block title %}Login - Online Subscription Portal{% endblock %}

{% block content %}
<section class="form-section">
    <div class="form-card">
        <h1>Login to Your Account</h1>
        <p class="form-text">
            Enter your email and password to access your dashboard and manage your subscriptions.
        </p>

        <form method="POST" action="{{ url_for('login') }}" class="auth-form">
            <div class="form-group">
                <label for="email">Email</label>
                <input type="email" id="email" name="email" value="{{ email or '' }}" placeholder="Enter your email address" required>
            </div>

            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Enter your password" required>
            </div>

            <button type="submit" class="btn btn-primary btn-full">Login</button>
        </form>

        <p class="form-footer-text">
            Don't have an account?
            <a href="{{ url_for('register') }}">Register here</a>
        </p>
    </div>
</section>
{% endblock %}
